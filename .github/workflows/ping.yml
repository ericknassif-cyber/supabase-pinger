name: Ping Supabase Projects

on:
  schedule:
    - cron: '0 9 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all Supabase projects
        run: |
          failed=0

          ping_project() {
            local name="$1"
            local url="$2"
            local key="$3"

            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "apikey: $key" \
              -H "Authorization: Bearer $key" \
              "$url/rest/v1/")

            if [[ "$status" =~ ^2 ]]; then
              echo "✅ $name → HTTP $status"
            else
              echo "::error::❌ $name FALHOU → HTTP $status (pode estar pausado — reative manualmente)"
              failed=$((failed + 1))
            fi
          }

          ping_project "bookhub-demo"    "https://tytqqkhodsnwmvgkrxnx.supabase.co" "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5dHFxa2hvZHNud212Z2tyeG54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTE3NTAsImV4cCI6MjA5NDc2Nzc1MH0.NrupCktu-SqTa-6SJaAKCN0dY3OBxnO6ptuLjGjwNmM"
